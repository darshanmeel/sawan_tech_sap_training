<!-- Directory · Cross-mode redirect page (e.g. ACDOCA → ECC equivalents) -->

<div class="container" style="padding-top: var(--space-4); padding-bottom: var(--space-7);">
<div class="directory-redirect" data-directory-redirect data-table-slug="{{slug}}" data-mode="{{currentMode}}">

  <header class="title-block">
    <div>
      <p class="eyebrow">Directory · {{modeLabel}}</p>
      <h1>{{redirectHeadline}}<em>.</em></h1>
      <p class="subtitle">{{redirectSubtitle}}</p>
    </div>
    <form class="directory-mode-form" method="get" action="{{basePath}}/directory/tables/{{slug}}/" data-directory-mode-form>
      <label for="directory-mode-{{slug}}-redirect" class="sr-only">Mode</label>
      <select id="directory-mode-{{slug}}-redirect" name="mode" data-directory-mode-select>
        <option value="s4" {{#isS4}}selected{{/isS4}}>S/4HANA</option>
        <option value="ecc" {{#isEcc}}selected{{/isEcc}}>ECC</option>
      </select>
      <noscript><button type="submit">Switch mode</button></noscript>
    </form>
  </header>

  <div class="body-grid directory-redirect-grid">
    <main>
      <section class="directory-redirect-body">
        <div class="prose">
          {{{body}}}
        </div>

        {{#equivalents.length}}
        <div class="directory-redirect-equivalents" data-equivalents>
          <h2>Equivalent tables in {{modeLabel}}</h2>
          <div class="directory-grid">
            {{#equivalents}}
            <article class="directory-card directory-card--equivalent" data-slug="{{slug}}">
              <header class="directory-card-head">
                <h3 class="directory-card-title"><a href="{{basePath}}/directory/tables/{{slug}}/">{{name}}</a></h3>
                {{#role}}<p class="directory-card-subtitle">{{role}}</p>{{/role}}
              </header>
              <footer class="directory-card-foot">
                <a class="directory-card-link" href="{{basePath}}/directory/tables/{{slug}}/">Open →</a>
              </footer>
            </article>
            {{/equivalents}}
          </div>
        </div>
        {{/equivalents.length}}
      </section>
    </main>
  </div>
</div>
</div>
